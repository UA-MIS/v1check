# ClusterIP Service fronting the app pods. Traefik routes ingress traffic here.
apiVersion: v1
kind: Service
metadata:
  name: v1check
  labels:
    app.kubernetes.io/name: v1check
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: v1check
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
