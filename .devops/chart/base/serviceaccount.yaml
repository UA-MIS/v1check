# Dedicated ServiceAccount for the workload. The app needs no API access
# (least privilege — §3.4 omits egress to the API server), so no RBAC is bound.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: v1check
  labels:
    app.kubernetes.io/name: v1check
automountServiceAccountToken: false
# Image pull from the PRIVATE Harbor team project (#C3): the workload image lives in
# a private Harbor project, so the pod needs the `harbor-pull` imagePullSecret to pull
# it — without this the Deployment ImagePullBackOffs (the "sample app won't deploy"
# gap). v1: `harbor-pull` is a docker-registry SealedSecret minted by the platform at
# onboarding (`make harbor-robot`) and committed as a per-namespace SealedSecret
# (overlays/<env>/harbor-pull.sealedsecret.yaml; the shipped ciphertext is a placeholder
# the operator replaces at onboarding). A post-v1 ESO flip is RESERVED at Vault path
# secret/data/tenants/<team>/<env>/harbor-pull (key .dockerconfigjson) — see .devops/
# README.md. Set on the SA (not the pod spec) so it applies to every pod using this SA.
# The robot is pull-only (least privilege).
imagePullSecrets:
  - name: harbor-pull
