# dev overlay — tracks main, auto-synced by the env ApplicationSet (§2.3).
# Image seam: dev follows the latest main build (promotion.yaml: dev=main digest).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: v1check-dev
resources:
  - ../../base
  # Per-tenant ESO store + SA (vault-tenant / eso-tenant, scoped to this team's
  # Vault path) — the tenant half of the ADR-030 B1 secrets contract.
  - secretstore.yaml
  # v1check-secret ExternalSecret (demonstrates the secret path; APP_SECRET in
  # base is optional + deletionPolicy Delete so a fresh repo with no Vault value still
  # deploys — M4 zero-config).
  - app-secret.externalsecret.yaml
  # harbor-pull image-pull cred (SA imagePullSecrets:[harbor-pull], #C3) — v1 SealedSecret.
  # The pull robot is Harbor-minted at onboarding (`make harbor-robot`) and committed as a
  # per-namespace SealedSecret; the stub here ships a placeholder ciphertext the operator
  # replaces at onboarding (see .devops/README.md). NOT on ESO in v1: a real ESO harbor-pull
  # needs onboarding to write the robot to Vault first (the make-harbor-robot migration is
  # on HOLD) — an ExternalSecret at an unpopulated path would be broken. RESERVED for a
  # post-v1 flip: Vault path `secret/data/tenants/<team>/<env>/harbor-pull` (key
  # .dockerconfigjson); ADR-030 follow-on, coordinated with eso-vault.
  - harbor-pull.sealedsecret.yaml
  # capstone:secrets — The Process "Secrets" tab (M3 ESO rework, ADR-030 §5) adds user
  # secret keys by APPENDING a `data[]` entry to app-secret.externalsecret.yaml above
  # (one ExternalSecret / one k8s Secret `v1check-secret` per env; all keys
  # share the Vault object `tenants/v1check/<env>/app`) — it does NOT add files
  # here. Manifests must stay INSIDE this overlay dir: a kustomize resource that escapes
  # the chart/ root (e.g. ../../../secrets/...) fails ArgoCD's default load restrictor.
# env-specific selector label (§3.1). semester comes from app-metadata via the
# tenant; set here for the workload's own label contract.
labels:
  - pairs:
      platform.capstone/env: dev
      platform.capstone/semester: 2026-fall
    includeSelectors: false
# Image-tag SEAM (§4.1): the CI image-bump (T8) rewrites newTag here.
images:
  - name: v1check
    newName: harbor.capstone.uamishub.com/v1check/v1check
    newTag: 329c707
replicas:
  - name: v1check
    count: 1
patches:
  - target:
      kind: Ingress
      name: v1check
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: v1check.dev.capstone.uamishub.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: v1check.dev.capstone.uamishub.com
