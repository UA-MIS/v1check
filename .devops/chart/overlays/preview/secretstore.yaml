# Per-tenant ESO SecretStore + ServiceAccount (ADR-030 B1 — per-namespace isolation).
#
# This is the tenant half of the secrets contract from platform-services/external-
# secrets/secretstore-template.yaml. It gives the workload namespace a NAMESPACED
# SecretStore (`vault-tenant`) that authenticates to Vault as a tenant-scoped SA
# (`eso-tenant`) via the Vault k8s-auth role `tenant-v1check` — a role whose
# policy is scoped to `secret/data/tenants/v1check/*` ONLY. So even ESO's
# read on behalf of THIS tenant's ExternalSecrets is fenced to this team's subtree:
# it cannot read another tenant's path or the platform path (least privilege, D-048).
#
# Platform side (out-of-band, run once per onboarded team by the operator — NOT the
# student build): `kubectl -n vault exec -i vault-0 -- sh -s -- v1check pr-1
# < platform-services/external-secrets/vault-policies/tenant-role.sh` creates the
# Vault policy + the `tenant-v1check` role bound to this SA. See
# platform-services/external-secrets/README.md §2.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-tenant
  namespace: v1check-pr-1
  labels:
    app.kubernetes.io/name: v1check
    platform.capstone/component: tenant
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-tenant
  namespace: v1check-pr-1
  labels:
    app.kubernetes.io/name: v1check
    platform.capstone/component: tenant
spec:
  provider:
    vault:
      server: "https://vault.vault.svc.cluster.local:8200"
      # KV v2 engine mounted at `secret`; ESO appends the v2 `/data` segment.
      path: "secret"
      version: "v2"
      # PUBLIC CA that signed the Vault server cert (git-safe — it is a public cert).
      # A NAMESPACED SecretStore cannot reference a Secret/ConfigMap in another
      # namespace (ESO: "SecretStores are bound to a namespace and cannot reference
      # resources across namespaces"), so this CANNOT caProvider the vault-server-tls
      # Secret in the `vault` ns. CONTRACT (owned by the ESO/Vault platform onboarding,
      # NOT this template): a ConfigMap `vault-ca` (key `ca.crt`, the public CA PEM
      # extracted from the vault-server-tls Secret) is materialized in EVERY onboarded
      # `<team>-<env>` ns before this SecretStore needs it. ESO reads it in-ns.
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          # Per-tenant Vault role -> policy scoped to secret/data/tenants/<team>/*.
          role: "tenant-v1check"
          serviceAccountRef:
            name: eso-tenant
            audiences:
              - vault
