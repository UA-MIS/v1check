# App secret — ESO ExternalSecret (ADR-030 B1, "no secret material in git").
#
# This declares the NAME + Vault POINTER only — NO value. ESO (via the per-tenant
# vault-tenant SecretStore) reads the value from Vault at
# secret/data/tenants/v1check/prod/app (key APP_SECRET) and materializes the
# in-namespace Secret `v1check-secret` (key `app-secret`), which the base
# Deployment envs into APP_SECRET. This replaces the Phase-1 SealedSecret (D-006) with
# the v1 ESO model — the value lives in Vault, written by the platform or by The
# Process "Secrets" tab (PushSecret / vault kv put), never committed here.
#
# M4 ZERO-CONFIG: deletionPolicy Delete means a MISSING Vault key is NOT an error —
# the ExternalSecret stays healthy and simply creates no Secret. Combined with the
# base's `optional: true` on APP_SECRET, a freshly-scaffolded app with nothing in
# Vault still deploys (the app reports "secret loaded: false"). A team that needs the
# secret writes it to Vault and the Secret appears on the next refresh.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: v1check-secret
  namespace: v1check-prod
  labels:
    app.kubernetes.io/name: v1check
    platform.capstone/component: tenant
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-tenant
    kind: SecretStore          # the per-tenant store (NOT the ClusterSecretStore)
  target:
    name: v1check-secret   # the k8s Secret the workload consumes
    creationPolicy: Owner
    deletionPolicy: Delete               # missing Vault key != error (M4 zero-config)
  data:
    - secretKey: app-secret
      remoteRef:
        key: tenants/v1check/prod/app
        property: APP_SECRET
