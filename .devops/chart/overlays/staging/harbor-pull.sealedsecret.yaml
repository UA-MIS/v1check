---
# harbor-pull — the per-namespace image-PULL credential the workload SA references
# (base/serviceaccount.yaml: imagePullSecrets:[harbor-pull]). Without this, the pod
# ImagePullBackOffs pulling the private Harbor image (the C3 deploy gap, #C3).
#
# PLACEHOLDER ciphertext below — REGENERATE before deploy (one-time, human op):
#   make harbor-robot NAME=v1check ENV=staging KUBE_CONTEXT=admin@capstone \
#     KUBECONFIG=<talos-kubeconfig> > staging/harbor-pull.sealedsecret.yaml
# That mints a project-scoped PULL robot via an in-cluster Job (admin creds never
# leave the cluster), builds a dockerconfigjson Secret, and kubeseals it STRICT to
# namespace 'v1check-staging' + name 'harbor-pull' (so it only decrypts in this ns). The robot
# token is Harbor-generated + one-time, so this CANNOT be declarative — it must be
# minted and committed at onboarding. See platform-services/harbor-onboarding/README.md
# (step 2) and platform-services/backstage/sealedsecret-harbor-pull.yaml (the pattern).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-pull
  namespace: v1check-staging
spec:
  encryptedData:
    # PLACEHOLDER — not a real sealed value; replaced by 'make harbor-robot' output.
    # Leaving this unminted means the pod cannot pull (ImagePullBackOff) until the
    # operator regenerates this file.
    .dockerconfigjson: PLACEHOLDER_REGENERATE_VIA_make_harbor-robot_NAME_v1check_ENV_staging
  template:
    metadata:
      name: harbor-pull
      namespace: v1check-staging
    type: kubernetes.io/dockerconfigjson
